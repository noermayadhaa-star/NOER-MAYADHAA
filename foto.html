<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto - Web Tema Coklat</title>
    <style>
        /* CSS DALAM SATU FILE */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f1ea; /* Krem lembut */
            color: #3e2723; /* Coklat tua */
        }

        header {
            background-color: #5d4037; /* Coklat medium */
            color: white;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav {
            background-color: #3e2723;
            display: flex;
            justify-content: center;
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: #d7ccc8;
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 5px;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: bold;
        }

        nav a:hover {
            background-color: #8d6e63;
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #5d4037;
            margin-bottom: 30px;
        }

        /* Styling Galeri Foto */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 8px;
            border: 4px solid #d7ccc8; /* Bingkai warna coklat muda */
            transition: transform 0.3s ease;
            background-color: #efebe9;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            border-color: #8d6e63;
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover; /* Agar gambar tidak gepeng */
            display: block;
        }

        .photo-caption {
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            color: #5d4037;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 0.9rem;
            color: #795548;
        }

        /* Responsif untuk HP */
        @media (max-width: 600px) {
            nav { flex-direction: column; align-items: center; }
            .container { margin: 15px; padding: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Galeri Foto</h1>
        <p>Koleksi momen dalam balutan warna bumi</p>
    </header>

    <nav>
        <a href

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto - Tema Coklat</title>
    <style>
        /* =========================================
           CSS INTERNAL (Menyatu dalam HTML)
           Tema: Coklat Elegan (Earth Tone)
           ========================================= */
        
        /* Reset Dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f1ea; /* Krem pucat */
            color: #3e2723; /* Coklat tua */
            line-height: 1.6;
        }

        /* Header */
        header {
            background-color: #5d4037; /* Coklat medium */
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Navigasi */
        nav {
            background-color: #3e2723; /* Coklat gelap */
            display: flex;
            justify-content: center;
            padding: 10px;
            position: sticky; /* Menempel di atas saat scroll */
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: #d7ccc8; /* Coklat sangat muda */
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 5px;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: bold;
        }

        nav a:hover {
            background-color: #8d6e63; /* Coklat terang saat hover */
            color: white;
        }

        /* Container Utama */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2.gallery-title {
            text-align: center;
            color: #5d4037;
            margin-bottom: 30px;
            border-bottom: 2px solid #d7ccc8;
            padding-bottom: 10px;
        }

        /* --- STYLING GALERI FOTO (GRID) --- */
        .gallery-grid {
            display: grid;
            /* Membuat kolom otomatis yang responsif */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; /* Jarak antar item */
        }

        .gallery-item {
            background-color: white;
            border-radius: 8px;
            overflow: hidden; /* Memastikan isi tidak keluar dari radius */
            border: 4px solid #efebe9; /* Bingkai coklat super muda */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        /* Efek Hover pada Item */
        .gallery-item:hover {
            transform: translateY(-5px); /* Terangkat sedikit */
            border-color: #8d6e63; /* Warna bingkai berubah */
        }

        /* Styling Gambar di Dalam Galeri */
        .gallery-item img {
            width: 100%;
            height: 250px; /* Tinggi seragam untuk semua foto */
            object-fit: cover; /* Gambar dipotong rapi agar tidak gepeng */
            display: block;
        }

        /* Styling Teks Keterangan */
        .photo-caption {
            padding: 15px;
            text-align: center;
        }

        .photo-caption h3 {
            font-size: 1.1rem;
            color: #5d4037;
            margin-bottom: 5px;
        }

        .photo-caption p {
            font-size: 0.9rem;
            color: #795548;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 0.9rem;
            color: #795548;
            border-top: 1px solid #d7ccc8;
        }

        /* Responsif (Tampilan HP) */
        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 15px;
            }
            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Album Visual</h1>
        <p>Koleksi Foto dalam Nuansa Earth Tone</p>
    </header>

    <nav>
        <a href="index.html">Beranda</a>
        <a href="biodata.html">Biodata</a>
        <a href="foto.html">Foto</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="container">
        <h2 class="gallery-title">Galeri Foto Saya</h2>
        
        <div class="gallery-grid">
            
            <div class="gallery-item">
                <img src="kos darii depan.jpeg" alt="Foto 1">
                <div class="photo-caption">
                    <h3>1</h3>
                    <p>Kos bagian depan</p>
                </div>
            </div>
            
            <div class="gallery-item">
                <img src="kos samping kiri.jpeg" alt="Foto 2 ">
                <div class="photo-caption">
                    <h3>2</h3>
                    <p>Kos bagian kiri</p>
                </div>
            </div>
            
            <div class="gallery-item">
                <img src="Kos dari belakang.jpeg" alt="Foto 3">
                <div class="photo-caption">
                    <h3>3</h3>
                    <p>Kos bagian belakang.</p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="kos dari luar.jpeg" alt="Foto 4">
                <div class="photo-caption">
                    <h3>4</h3>
                    <p>Kos bagian luar.</p>
                </div>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1459755484507-02385a1c399b?w=600" alt="Deskripsi Foto 5">
                <div class="photo-caption">
                    <h3>5/h3>
                    <p>Profil saya.</p>
                </div>
            </div>

            
        </div> </div> <footer>
        &copy; 2026 - Noer Mayadha| Tema Coklat
    </footer>

</body>
</html>

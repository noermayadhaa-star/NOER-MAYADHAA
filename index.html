<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - Web Tema Coklat</title>
    <style>
        /* CSS DALAM SATU FILE */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f1ea; /* Warna latar krem/coklat muda */
            color: #3e2723; /* Warna teks coklat tua */
        }

        header {
            background-color: #5d4037; /* Coklat medium */
            color: white;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav {
            background-color: #3e2723; /* Coklat gelap */
            display: flex;
            justify-content: center;
            padding: 10px;
            position: sticky;
            top: 0;
        }

        nav a {
            color: #d7ccc8;
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 5px;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: bold;
        }

        nav a:hover {
            background-color: #8d6e63;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            line-height: 1.6;
        }

        h2 {
            color: #5d4037;
            border-bottom: 2px solid #d7ccc8;
            padding-bottom: 10px;
        }

        .welcome-section {
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 0.9rem;
            color: #795548;
            border-top: 1px solid #d7ccc8;
        }

        /* Responsif untuk HP */
        @media (max-width: 600px) {
            nav {
                flex-direction: column;
                align-items: center;
            }
            nav a {
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Selamat datang!</h1>
        <p>Di Website Saya</p>
    </header>

    <nav>
        <a href="index.html">Beranda</a>
        <a href="biodata.html">Biodata</a>
        <a href="foto.html">Foto</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="container">
        <section class="welcome-section">
            <h2></h2>
            <p>
                Halo! Kenalin saya Maya, Selamat datang di website bertema Coklat yang saya buat.
            </p>
            <p>
                Silahkan jelajahi menu navigasi di atas untuk melihat detail biodata diri, 
                koleksi foto galeri, video yang tersedia ya.
            </p>
        </section>
    </div>

    <footer>
        &copy; 2026 - Dibuat oleh Maya ❤️ 
    </footer>

</body>
</html>
